name: Build and Push Images

on:
  push:
    branches: [ main ]

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Build and Push Backend
        run: |
          docker build -f Dockerfile.backend -t ghcr.io/$OWNER_LC/mern-backend:latest .
          docker push ghcr.io/$OWNER_LC/mern-backend:latest

      - name: Build and Push Frontend
        run: |
          docker build -f Dockerfile.frontend -t ghcr.io/$OWNER_LC/mern-frontend:latest .
          docker push ghcr.io/$OWNER_LC/mern-frontend:latest
